<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Experience - Tyrolienne Monastir</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/scene.css">
  <style>
    #ui-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 1000;
      pointer-events: none;
    }
    .ui-card {
      background: rgba(7, 9, 15, 0.7);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(0, 217, 255, 0.2);
      pointer-events: auto;
      margin-bottom: 10px;
    }
    .btn-back {
      display: inline-block;
      margin-bottom: 20px;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="scene-container"></div>

  <div id="ui-overlay">
    <a href="/" class="btn-back">&larr; Retour</a>
    <div class="ui-card">
        <h2 style="color: var(--color-primary); margin-bottom: 10px;">Simulation en Temps Réel</h2>
        <div class="telemetry">
            <div class="data-row"><span>Vitesse:</span> <span id="rider-speed">0.0 m/s</span></div>
            <div class="data-row"><span>Altitude:</span> <span id="rider-altitude">0.0 m</span></div>
            <div class="data-row"><span>Distance:</span> <span id="rider-distance">0 m</span></div>
            <div class="data-row"><span>Tension:</span> <span id="cable-tension">0.0 kN</span></div>
            <div class="data-row"><span>G-Force:</span> <span id="g-force">1.00 g</span></div>
        </div>
    </div>

    <div class="ui-card">
        <button id="play-pause" class="btn btn-primary" style="width: 100%; margin-bottom: 10px;">Play</button>
        <button id="reset" class="btn btn-secondary" style="width: 100%;">Reset</button>
    </div>
  </div>

  <div class="controls-panel glass-panel">
    <div class="panel-header">
        <h3>Configuration</h3>
        <button id="toggle-panel" style="background:none; border:none; color:white; cursor:pointer; font-size:1.5rem;">&minus;</button>
    </div>
    <div class="panel-content">
        <div class="control-group">
            <h4>Caméra</h4>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="view-btn btn-secondary" data-view="default" style="padding: 5px; font-size: 0.8rem;">Défaut</button>
                <button class="view-btn btn-secondary" data-view="rider" style="padding: 5px; font-size: 0.8rem;">Passager</button>
                <button class="view-btn btn-secondary" data-view="departure" style="padding: 5px; font-size: 0.8rem;">Départ</button>
                <button class="view-btn btn-secondary" data-view="arrival" style="padding: 5px; font-size: 0.8rem;">Arrivée</button>
            </div>
        </div>
        <div class="control-group">
            <h4>Environnement</h4>
            <label>Heure: <span id="time-display">12:00</span></label>
            <input type="range" id="time-slider" min="5" max="19" step="0.1" value="12">

            <label style="margin-top: 10px; display: block;">Vent: <span id="wind-value">10</span> km/h</label>
            <input type="range" id="wind-slider" min="0" max="100" value="10">
        </div>
        <div class="control-group">
            <h4>Simulation</h4>
            <label>Vitesse: <span id="speed-value">1.0x</span></label>
            <input type="range" id="speed-slider" min="0.1" max="5" step="0.1" value="1">
        </div>
    </div>
  </div>

  <script type="module" src="/js/scene/SceneManager.js"></script>
</body>
</html>
