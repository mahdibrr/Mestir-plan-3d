<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Scene - Tyrolienne Monastir</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/scene.css">
</head>
<body style="overflow: hidden;"> <!-- Prevent scroll on 3D canvas -->
  <!-- Back Button overlay -->
  <a href="/" class="btn btn-secondary" style="position: absolute; top: 20px; left: 20px; z-index: 1000; padding: 0.5rem 1rem;">
    &larr; Back to Home
  </a>
  
  <!-- Overlay Controls Panel -->
  <div class="controls-panel glass-panel">
    <div class="panel-header">
      <h3>Controls</h3>
      <button id="toggle-panel" class="btn-outline">&minus;</button>
    </div>
    <div class="panel-content">
      <div class="control-group">
        <h4>Animation</h4>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
          <button id="play-pause" class="btn btn-primary" style="padding: 0.5rem 1rem">Play</button>
          <button id="reset" class="btn btn-secondary" style="padding: 0.5rem 1rem">Reset</button>
        </div>
        <label>Speed: <span id="speed-value" style="float:right; color:#00D9FF;">1.0x</span></label>
        <input type="range" id="speed-slider" min="0.1" max="3" step="0.1" value="1">
      </div>
      
      <div class="control-group">
        <h4>Camera Views</h4>
        <div style="display:flex; flex-wrap:wrap; gap:5px;">
          <button class="view-btn btn-secondary" style="padding: 0.4rem 0.6rem; font-size:0.8rem" data-view="overview">Overview</button>
          <button class="view-btn btn-secondary" style="padding: 0.4rem 0.6rem; font-size:0.8rem" data-view="tower">Tower</button>
          <button class="view-btn btn-secondary" style="padding: 0.4rem 0.6rem; font-size:0.8rem" data-view="cable">Cable</button>
        </div>
      </div>
      
      <div class="control-group telemetry">
        <h4>Real-time Data</h4>
        <div class="data-row"><span>Speed:</span><span id="rider-speed">0.0 m/s</span></div>
        <div class="data-row"><span>Altitude:</span><span id="rider-altitude">0.0 m</span></div>
        <div class="data-row"><span>Distance:</span><span id="rider-distance">0 m</span></div>
        <div class="data-row"><span>Tension:</span><span id="cable-tension">45.0 kN</span></div>
        <div class="data-row"><span>G-Force:</span><span id="g-force">1.0 g</span></div>
      </div>
    </div>
  </div>
  
  <!-- Canvas container for Three.js -->
  <div id="scene-container" style="width: 100vw; height: 100vh;"></div>
  
  <!-- Module entry point for Phase 2+ -->
  <script type="module" src="/js/scene/SceneManager.js"></script>
</body>
</html>
